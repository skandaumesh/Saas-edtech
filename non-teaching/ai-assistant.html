<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AI Assistant | Admin Panel</title>
  <link rel="icon" type="image/png" href="logo2.png" />
  <script src="js/config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL@20..48,100..700,0..1" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.0.0/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.21/jspdf.plugin.autotable.min.js"></script>
  <style>
    :root {
      --bg-root:#0C0C0E;--bg-sidebar:#111113;--bg-surface:#161618;
      --bg-card:#1A1A1D;--bg-card-hover:#1F1F22;--bg-elevated:#242427;
      --border:rgba(255,255,255,0.05);--border-hover:rgba(255,255,255,0.09);
      --text-primary:#E8E8EC;--text-secondary:#8A8A92;--text-muted:#4E4E56;
      --green:#34D399;--green-dim:rgba(52,211,153,0.15);
      --red:#F87171;--red-dim:rgba(248,113,113,0.15);
      --amber:#FBBF24;--amber-dim:rgba(251,191,36,0.15);
      --purple:#A78BFA;--purple-dim:rgba(167,139,250,0.12);
      --blue:#60A5FA;--blue-dim:rgba(96,165,250,0.15);
      --sidebar-w:220px;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg-root);color:var(--text-primary);height:100vh;display:flex;overflow:hidden;-webkit-font-smoothing:antialiased;}

    /* ══════════ SIDEBAR ══════════ */
    .sidebar{width:var(--sidebar-w);background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 12px;flex-shrink:0;overflow-y:auto;}
    .sidebar::-webkit-scrollbar{width:0;}
    .sb-logo{padding:4px 8px;margin-bottom:20px;text-align:center;}
    .sb-logo img{width:100%;height:auto;border-radius:8px;}
    .sb-search{display:flex;align-items:center;gap:8px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:20px;cursor:pointer;}
    .sb-search .material-symbols-rounded{font-size:16px;color:var(--text-muted);}
    .sb-search span:last-child{font-size:12px;color:var(--text-muted);}
    .sb-group{margin-bottom:8px;}
    .sb-link{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;text-decoration:none;color:var(--text-secondary);font-size:13px;font-weight:500;transition:all .15s;}
    .sb-link:hover{background:rgba(255,255,255,0.04);color:var(--text-primary);}
    .sb-link.active{background:rgba(255,255,255,0.06);color:var(--text-primary);font-weight:600;}
    .sb-link .material-symbols-rounded{font-size:18px;}
    .sb-divider{height:1px;background:var(--border);margin:12px 8px;}
    .sb-bottom{margin-top:auto;padding-top:12px;}
    .sb-logout{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;width:100%;background:none;border:none;color:var(--text-muted);font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;transition:all .15s;}
    .sb-logout:hover{background:var(--red-dim);color:var(--red);}
    .sb-logout .material-symbols-rounded{font-size:18px;}

    /* ══════════ MAIN ══════════ */
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}

    /* ══════════ HEADER ══════════ */
    .header{padding:16px 28px 12px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;z-index:10;border-bottom:1px solid var(--border);}
    .header h1{font-size:18px;font-weight:700;letter-spacing:-0.3px;display:flex;align-items:center;gap:8px;}
    .header h1 .material-symbols-rounded{font-size:20px;color:var(--purple);}
    .header-actions{display:flex;align-items:center;gap:10px;}
    .header-btn{background:none;border:1px solid var(--border);color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:7px;border-radius:8px;transition:all .2s;font-family:inherit;}
    .header-btn:hover{background:rgba(255,255,255,0.04);color:var(--text-primary);}
    .header-btn-text{gap:6px;font-size:12px;font-weight:600;padding:7px 12px;}
    .avatar-pill{display:flex;align-items:center;gap:8px;padding:4px 12px 4px 4px;background:var(--bg-card);border:1px solid var(--border);border-radius:40px;}
    .avatar-dot{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#6366F1,#A78BFA);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;}
    .avatar-info .av-name{font-size:11px;font-weight:600;}
    .avatar-info .av-email{font-size:9px;color:var(--text-muted);}

    /* ══════════ CHAT ══════════ */
    .chat-container{flex:1;display:flex;flex-direction:column;max-width:800px;margin:0 auto;width:100%;position:relative;transition:all .5s;min-height:0;overflow:hidden;}
    .messages-area{flex:1 1 0;overflow-y:auto;padding:20px 24px 140px;display:flex;flex-direction:column;gap:24px;transition:all .5s;min-height:0;scrollbar-width:thin;scrollbar-color:transparent transparent;}
    .messages-area:hover{scrollbar-color:rgba(255,255,255,0.1) transparent;}
    .messages-area::-webkit-scrollbar{width:5px;}
    .messages-area::-webkit-scrollbar-track{background:transparent;}
    .messages-area::-webkit-scrollbar-thumb{background:transparent;border-radius:10px;}
    .messages-area:hover::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);}

    .welcome-state{text-align:center;transition:all .5s;}
    .welcome-title{font-size:34px;font-weight:700;color:var(--text-primary);margin-bottom:10px;letter-spacing:-1.2px;}
    .welcome-subtitle{font-size:15px;color:var(--text-secondary);max-width:460px;margin:0 auto;line-height:1.6;}

    .chat-container.initial-state{justify-content:center;padding-bottom:15vh;}
    .chat-container.initial-state .messages-area{flex:none;padding:0;margin-bottom:40px;}
    .chat-container.initial-state .welcome-state{display:block;}
    .chat-container:not(.initial-state) .welcome-state{display:none;}
    .chat-container.initial-state .input-area{position:relative;bottom:auto;margin:0;width:100%;max-width:680px;align-self:center;padding:0;}

    /* ══════════ MESSAGES ══════════ */
    .message-row{display:flex;gap:14px;margin-bottom:4px;max-width:90%;animation:msgIn .4s cubic-bezier(.16,1,.3,1) forwards;opacity:0;}
    @keyframes msgIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
    .message-row.user-row{flex-direction:row-reverse;align-self:flex-end;}
    .bubble{padding:14px 20px;border-radius:20px;font-size:14.5px;line-height:1.7;}
    .user-bubble{background:var(--bg-elevated);color:var(--text-primary);border-bottom-right-radius:4px;font-weight:400;}
    .ai-bubble{background:transparent;border:none;color:var(--text-secondary);padding:4px 0;border-radius:0;font-size:14px;line-height:1.75;}
    .ai-avatar-msg{width:30px;height:30px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0;}

    /* ══════════ AI MARKDOWN ══════════ */
    .ai-bubble h2{font-size:16px;font-weight:700;color:var(--text-primary);margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
    .ai-bubble h2:first-child{margin-top:0;}
    .ai-bubble h3{font-size:14px;font-weight:600;color:var(--text-primary);margin:12px 0 6px;}
    .ai-bubble p{margin-bottom:10px;color:var(--text-secondary);}
    .ai-bubble p:last-child{margin-bottom:0;}
    .ai-bubble ul,.ai-bubble ol{padding-left:20px;margin:8px 0 12px;}
    .ai-bubble li{margin-bottom:5px;color:var(--text-secondary);}
    .ai-bubble li::marker{color:var(--green);}
    .ai-bubble strong{font-weight:600;color:var(--text-primary);}
    .ai-bubble code{background:#000;padding:2px 6px;border-radius:4px;font-size:12px;font-family:'JetBrains Mono',monospace;color:#A5B4FC;}
    .ai-bubble a{color:#7C9BF4;text-decoration:none;border-bottom:1px solid rgba(124,155,244,0.3);transition:border-color .2s;}
    .ai-bubble a:hover{border-bottom-color:#7C9BF4;}
    .ai-bubble blockquote{border-left:3px solid var(--green);margin:10px 0 14px;padding:10px 16px;background:rgba(52,211,153,0.06);border-radius:0 10px 10px 0;font-size:13px;color:var(--text-secondary);}
    .ai-bubble blockquote p{margin:0;}
    .ai-bubble hr{border:none;height:1px;background:var(--border);margin:14px 0;}

    /* ══════════ AI TABLES ══════════ */
    .ai-bubble table{width:100%;border-collapse:separate;border-spacing:0;margin:12px 0;border-radius:10px;overflow:hidden;border:1px solid var(--border);font-size:12px;}
    .ai-bubble th,.ai-bubble td{padding:9px 12px;text-align:left;border-bottom:1px solid var(--border);}
    .ai-bubble th{background:var(--bg-elevated);color:var(--text-primary);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;}
    .ai-bubble tr:last-child td{border-bottom:none;}
    .ai-bubble tr:nth-child(even){background:rgba(255,255,255,0.02);}
    .ai-bubble tr:hover{background:rgba(255,255,255,0.04);}

    .table-container-wrapper{margin-top:12px;border:1px solid var(--border);border-radius:10px;background:var(--bg-card);overflow:hidden;}
    .table-content-area{padding:10px;overflow-x:auto;}
    .table-footer{display:flex;justify-content:flex-end;align-items:center;padding:8px 12px;background:var(--bg-elevated);border-top:1px solid var(--border);position:relative;}
    .table-actions-trigger{width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted);border-radius:6px;transition:all .2s;}
    .table-actions-trigger:hover{background:rgba(255,255,255,0.06);color:var(--text-primary);}
    .table-dropdown{position:absolute;right:12px;bottom:40px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;box-shadow:0 4px 15px rgba(0,0,0,0.4);z-index:1000;display:none;flex-direction:column;padding:4px;min-width:150px;}
    .table-dropdown.show{display:flex;}
    .table-dropdown-item{padding:10px 12px;font-size:12px;font-weight:600;color:var(--text-secondary);display:flex;align-items:center;gap:10px;border-radius:8px;cursor:pointer;transition:all .2s;}
    .table-dropdown-item:hover{background:rgba(255,255,255,0.06);color:var(--text-primary);}
    .table-dropdown-item .material-symbols-rounded{font-size:18px;}

    /* ══════════ INPUT BAR ══════════ */
    .input-area{position:absolute;bottom:20px;left:0;right:0;z-index:100;padding:0 20px;transition:all .5s cubic-bezier(.4,0,.2,1);}
    .input-box-wrapper{background:var(--bg-elevated);border-radius:24px;padding:10px 16px;display:flex;align-items:center;gap:12px;border:1px solid var(--border);transition:all .3s;}
    .input-box-wrapper:focus-within{border-color:var(--border-hover);}
    .input-field{flex:1;border:none;background:transparent;padding:8px 0;font-size:14px;font-family:inherit;outline:none;max-height:150px;resize:none;color:var(--text-primary);}
    .input-field::placeholder{color:var(--text-muted);}
    .send-btn{width:34px;height:34px;background:var(--text-primary);color:var(--bg-root);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;}
    .send-btn:hover{opacity:0.85;}
    .send-btn:disabled{opacity:0.3;cursor:not-allowed;}
    .send-btn .material-symbols-rounded{font-size:18px;}

    /* ══════════ TYPING ══════════ */
    .typing{display:flex;gap:4px;padding:10px 0;}
    .dot{width:6px;height:6px;background:var(--text-muted);border-radius:50%;animation:bounce 1.4s infinite ease-in-out;}
    .dot:nth-child(2){animation-delay:.2s;}
    .dot:nth-child(3){animation-delay:.4s;}
    @keyframes bounce{0%,80%,100%{transform:scale(0);}40%{transform:scale(1);}}

    /* ══════════ SCROLL TO BOTTOM ══════════ */
    .scroll-to-bottom{position:absolute;bottom:80px;right:24px;width:38px;height:38px;border-radius:50%;background:var(--bg-elevated);color:var(--text-primary);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(10px) scale(.9);pointer-events:none;transition:all .25s;z-index:100;}
    .scroll-to-bottom.visible{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
    .scroll-to-bottom:hover{background:var(--bg-card-hover);}
    .scroll-to-bottom .material-symbols-rounded{font-size:20px;}

    /* ══════════ HISTORY DRAWER ══════════ */
    .history-drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);z-index:2000;opacity:0;pointer-events:none;transition:opacity .3s;}
    .history-drawer-overlay.show{opacity:1;pointer-events:auto;}
    .history-drawer{position:fixed;top:0;right:-320px;bottom:0;width:300px;max-width:85vw;background:var(--bg-sidebar);border-left:1px solid var(--border);z-index:2001;transition:right .3s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column;}
    .history-drawer.show{right:0;}
    .history-header{padding:20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
    .history-header h3{font-size:16px;font-weight:700;color:var(--text-primary);}
    .history-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-muted);display:flex;align-items:center;transition:color .2s;}
    .history-close:hover{color:var(--red);}
    .history-list{flex:1;overflow-y:auto;padding:12px;}
    .history-item{padding:12px 14px;border-radius:10px;background:var(--bg-card);margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all .2s;border:1px solid var(--border);}
    .history-item:hover{border-color:var(--border-hover);background:var(--bg-card-hover);}
    .history-item.active{background:var(--bg-elevated);border-color:var(--purple);border-color:rgba(167,139,250,0.3);}
    .history-item-content{flex:1;overflow:hidden;}
    .history-title{font-size:13px;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
    .history-time{font-size:10px;color:var(--text-muted);}
    .history-delete{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:6px;border-radius:6px;display:flex;align-items:center;justify-content:center;opacity:0.5;transition:all .2s;margin-left:6px;}
    .history-delete:hover{background:var(--red-dim);color:var(--red);opacity:1;}

    @media(max-width:768px){.sidebar{display:none;}.messages-area{padding:16px 16px 120px;}}
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sb-logo"><img src="logo.png" alt="Logo"></div>
    <div class="sb-group">
      <a href="dashboard.html" class="sb-link"><span class="material-symbols-rounded">dashboard</span>Dashboard</a>
      <a href="students.html" class="sb-link"><span class="material-symbols-rounded">group</span>Students</a>
      <a href="report.html" class="sb-link"><span class="material-symbols-rounded">description</span>Reports</a>
      <a href="promotion.html" class="sb-link"><span class="material-symbols-rounded">trending_up</span>Promote</a>
    </div>
    <div class="sb-divider"></div>
    <div class="sb-group">
      <a href="ai-assistant.html" class="sb-link active"><span class="material-symbols-rounded">auto_awesome</span>AI Assistant</a>
      <a href="teachers.html" class="sb-link"><span class="material-symbols-rounded">person</span>Teachers</a>
      <a href="mentorship.html" class="sb-link"><span class="material-symbols-rounded">school</span>Mentors</a>
      <a href="msg.html" class="sb-link" id="nav-whatsapp"><span class="material-symbols-rounded">chat</span>WhatsApp</a>
    </div>
    <div class="sb-divider"></div>
    <div class="sb-bottom"><button class="sb-logout" id="logoutBtn"><span class="material-symbols-rounded">logout</span>Log Out</button></div>
  </aside>

  <div class="main">
    <header class="header">
      <div><h1><span class="material-symbols-rounded">auto_awesome</span> AI Assistant</h1></div>
      <div class="header-actions">
        <button class="header-btn" onclick="toggleHistory()" title="Chat History"><span class="material-symbols-rounded" style="font-size:18px;">history</span></button>
        <button class="header-btn header-btn-text" onclick="newChat()"><span class="material-symbols-rounded" style="font-size:16px;">edit_square</span>New Chat</button>
        <div class="avatar-pill">
          <div class="avatar-dot" id="headerAvatar">AD</div>
          <div class="avatar-info"><div class="av-name" id="headerUserName">Admin</div><div class="av-email" id="headerUserEmail">Admin Portal</div></div>
        </div>
      </div>
    </header>

    <!-- History Drawer -->
    <div class="history-drawer-overlay" id="historyOverlay" onclick="toggleHistory()"></div>
    <div class="history-drawer" id="historyDrawer">
      <div class="history-header"><h3>Chat History</h3><button class="history-close" onclick="toggleHistory()"><span class="material-symbols-rounded">close</span></button></div>
      <div class="history-list" id="historySidebarList"></div>
    </div>

    <div class="chat-container initial-state" id="chatContainer">
      <div class="messages-area" id="messagesArea">
        <div class="welcome-state" id="welcomeState">
          <h1 class="welcome-title" id="welcomeTitle">How can I help you?</h1>
          <p class="welcome-subtitle">Ask anything about attendance reports, student performance, or promotions.</p>
        </div>
      </div>

      <button class="scroll-to-bottom" id="scrollToBottomBtn" onclick="scrollToBottom()">
        <span class="material-symbols-rounded">keyboard_arrow_down</span>
      </button>

      <div class="input-area">
        <div class="input-box-wrapper">
          <textarea class="input-field" id="messageInput" placeholder="Message Smart AI..." rows="1"></textarea>
          <button class="send-btn" id="sendBtn"><span class="material-symbols-rounded">arrow_upward</span></button>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase Auth -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
    import { firebaseConfig } from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    window.firebaseAuth = auth;

    document.getElementById("logoutBtn").onclick = () => {
      signOut(auth).then(() => { localStorage.clear(); sessionStorage.clear(); window.location.replace("index.html"); });
    };

    onAuthStateChanged(auth, (user) => {
      if (user && user.email) {
        let name = user.displayName;
        if (!name) {
          name = user.email.split('@')[0].replace(/[0-9.]/g, ' ').trim();
          name = name.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }
        document.getElementById('headerUserName').textContent = name;
        if (document.getElementById('headerUserEmail')) document.getElementById('headerUserEmail').textContent = user.email;
        const parts = name.trim().split(' ').filter(Boolean);
        const initials = parts.length > 1 ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase() : name.substring(0, 2).toUpperCase();
        document.getElementById('headerAvatar').textContent = initials;
        document.getElementById('welcomeTitle').textContent = `How can I help you, ${name.split(' ')[0]}?`;
      } else { window.location.href = 'index.html'; }
    });
  </script>

  <script>
    const chatContainer = document.getElementById('chatContainer');
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    // ====================================
    // CONVERSATION MEMORY & HISTORY
    // ====================================
    let conversationHistory = [];
    let currentSessionId = Date.now().toString();
    const SESSION_EXPIRY_MS = 24 * 60 * 60 * 1000;

    function getHistory() {
      try {
        const stored = localStorage.getItem('ai_chat_sessions_admin');
        let sessions = stored ? JSON.parse(stored) : [];
        const now = Date.now();
        const validSessions = sessions.filter(s => (now - s.lastUpdated) < SESSION_EXPIRY_MS);
        if (sessions.length !== validSessions.length) localStorage.setItem('ai_chat_sessions_admin', JSON.stringify(validSessions));
        return validSessions;
      } catch (e) { return []; }
    }

    function saveSession() {
      if (conversationHistory.length === 0) return;
      const title = conversationHistory[0].content;
      const sessions = getHistory();
      const existingIdx = sessions.findIndex(s => s.id === currentSessionId);
      const sessionData = { id: currentSessionId, title, lastUpdated: Date.now(), history: conversationHistory, html: messagesArea.innerHTML, hasInitialState: chatContainer.classList.contains('initial-state') };
      if (existingIdx >= 0) sessions[existingIdx] = sessionData; else sessions.unshift(sessionData);
      localStorage.setItem('ai_chat_sessions_admin', JSON.stringify(sessions));
      renderHistorySidebar();
    }

    function renderHistorySidebar() {
      const sessions = getHistory();
      const listEl = document.getElementById('historySidebarList');
      if (!listEl) return;
      if (sessions.length === 0) { listEl.innerHTML = '<div style="text-align:center;color:var(--text-muted);font-size:12px;padding:20px;">No recent history.</div>'; return; }
      listEl.innerHTML = sessions.map(s => {
        const mins = Math.floor((Date.now() - s.lastUpdated) / 60000);
        let timeStr = mins < 60 ? `${mins}m ago` : `${Math.floor(mins / 60)}h ago`;
        if (mins === 0) timeStr = 'Just now';
        if (mins > 1440) timeStr = '1d+ ago';
        return `<div class="history-item ${s.id === currentSessionId ? 'active' : ''}" onclick="loadSession('${s.id}')"><div class="history-item-content"><div class="history-title">${s.title.replace(/</g, '&lt;')}</div><div class="history-time">${timeStr}</div></div><button class="history-delete" onclick="deleteSession(event, '${s.id}')" aria-label="Delete"><span class="material-symbols-rounded" style="font-size:15px;">delete</span></button></div>`;
      }).join('');
    }

    function loadSession(id) {
      const session = getHistory().find(s => s.id === id);
      if (!session) return;
      currentSessionId = session.id;
      conversationHistory = session.history || [];
      messagesArea.innerHTML = session.html || '';
      if (session.hasInitialState) chatContainer.classList.add('initial-state'); else chatContainer.classList.remove('initial-state');
      renderHistorySidebar();
      toggleHistory();
      setTimeout(scrollToBottom, 100);
    }

    function deleteSession(e, id) {
      e.stopPropagation();
      let sessions = getHistory().filter(s => s.id !== id);
      localStorage.setItem('ai_chat_sessions_admin', JSON.stringify(sessions));
      if (id === currentSessionId) newChat(); else renderHistorySidebar();
    }

    window.toggleHistory = function () {
      const overlay = document.getElementById('historyOverlay');
      const drawer = document.getElementById('historyDrawer');
      if (overlay && drawer) { overlay.classList.toggle('show'); drawer.classList.toggle('show'); }
    };

    window.addEventListener('DOMContentLoaded', () => { renderHistorySidebar(); });

    messageInput.addEventListener('input', function () { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 150) + 'px'; });

    function scrollToBottom() {
      const doScroll = () => { messagesArea.scrollTop = messagesArea.scrollHeight + 1000; };
      doScroll(); setTimeout(doScroll, 50); setTimeout(doScroll, 150); setTimeout(doScroll, 300);
    }

    messagesArea.addEventListener('scroll', () => {
      const btn = document.getElementById('scrollToBottomBtn');
      if (!btn) return;
      const dist = messagesArea.scrollHeight - messagesArea.scrollTop - messagesArea.clientHeight;
      if (dist > 200) btn.classList.add('visible'); else btn.classList.remove('visible');
    });

    function newChat() {
      conversationHistory = [];
      currentSessionId = Date.now().toString();
      const welcomeState = document.getElementById('welcomeState');
      messagesArea.innerHTML = '';
      if (welcomeState) messagesArea.appendChild(welcomeState);
      chatContainer.classList.add('initial-state');
      renderHistorySidebar();
    }
    window.newChat = newChat;

    function addUserMsg(text) {
      chatContainer.classList.remove('initial-state');
      const div = document.createElement('div');
      div.className = 'message-row user-row';
      div.innerHTML = `<div class="bubble user-bubble">${text.replace(/</g, "&lt;")}</div>`;
      messagesArea.appendChild(div);
      scrollToBottom();
    }

    function addAIMsg(html) {
      const row = document.createElement('div');
      row.className = 'message-row';
      let processedHtml = html;
      if (html.includes('<table')) {
        processedHtml = `<div class="table-container-wrapper"><div class="table-content-area">${html}</div><div class="table-footer"><div class="table-actions-trigger" onclick="toggleTableMenu(this)"><span class="material-symbols-rounded">more_vert</span></div><div class="table-dropdown"><div class="table-dropdown-item" onclick="exportTableToExcel(this)"><span class="material-symbols-rounded">description</span> Excel</div><div class="table-dropdown-item" onclick="exportTableToPDF(this)"><span class="material-symbols-rounded">picture_as_pdf</span> PDF</div></div></div></div>`;
      }
      row.innerHTML = `<div class="ai-avatar-msg"><span class="material-symbols-rounded">auto_awesome</span></div><div class="bubble ai-bubble">${processedHtml}</div>`;
      messagesArea.appendChild(row);
      scrollToBottom();
    }

    function toggleTableMenu(el) {
      const dropdown = el.nextElementSibling;
      const isShown = dropdown.classList.contains('show');
      document.querySelectorAll('.table-dropdown').forEach(d => d.classList.remove('show'));
      if (!isShown) dropdown.classList.add('show');
    }

    window.addEventListener('click', (e) => {
      if (!e.target.closest('.table-container-wrapper')) document.querySelectorAll('.table-dropdown').forEach(d => d.classList.remove('show'));
    });

    function exportTableToExcel(el) {
      try { const table = el.closest('.table-container-wrapper').querySelector('table'); const wb = XLSX.utils.table_to_book(table, { sheet: "AI Report" }); XLSX.writeFile(wb, "Smart_Attendance_AI_Report.xlsx"); } catch (e) { alert("Excel export failed"); }
      el.parentElement.classList.remove('show');
    }

    function exportTableToPDF(el) {
      try { const { jsPDF } = window.jspdf; const doc = new jsPDF(); const table = el.closest('.table-container-wrapper').querySelector('table'); doc.autoTable({ html: table, theme: 'grid', headStyles: { fillColor: [99, 102, 241] }, styles: { fontSize: 8 } }); doc.save("Smart_Attendance_AI_Report.pdf"); } catch (e) { alert("PDF export failed"); }
      el.parentElement.classList.remove('show');
    }

    function showTyping() {
      const div = document.createElement('div'); div.id = 'typing'; div.className = 'message-row';
      div.innerHTML = `<div class="ai-avatar-msg"><span class="material-symbols-rounded">auto_awesome</span></div><div class="bubble ai-bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
      messagesArea.appendChild(div); scrollToBottom();
    }

    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;
      addUserMsg(text);
      messageInput.value = ''; messageInput.style.height = 'auto';
      conversationHistory.push({ role: 'user', content: text });
      showTyping();
      try {
        const res = await fetch(`${window.APP_CONFIG.API_BASE_URL}/chatbot/chat`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ question: text, history: conversationHistory.slice(0, -1) }) });
        const data = await res.json();
        document.getElementById('typing').remove();
        if (data.success) {
          const content = typeof marked !== 'undefined' ? marked.parse(data.answer) : data.answer;
          addAIMsg(content);
          conversationHistory.push({ role: 'assistant', content: data.answer });
          if (conversationHistory.length > 40) conversationHistory = conversationHistory.slice(-40);
          saveSession();
        } else { addAIMsg(`Error: ${data.error || 'Server returned an error.'}`); saveSession(); }
      } catch (e) {
        if (document.getElementById('typing')) document.getElementById('typing').remove();
        addAIMsg(`Connection failed: ${e.message}. Check if backend is running.`);
      }
    }

    sendBtn.onclick = sendMessage;
    messageInput.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
  </script>
</body>
</html>
